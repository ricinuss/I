<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Início - Sala de aula</title>
    <link rel="icon" type="image/svg+xml" href="https://www.gstatic.com/classroom/logo_square_rounded.svg">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            overflow-x: hidden;
        }

        body {
            background-color: #0a0a0a;
            color: #a0a0a0;
            font-family: 'SF Mono', 'Consolas', 'Courier New', monospace;
            padding: 40px 20px;
        }

        .container {
            max-width: 640px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 18px;
            color: #e0e0e0;
            font-weight: 600;
            margin-bottom: 4px;
        }

        header p {
            font-size: 12px;
            color: #555;
        }

        .disclaimer {
            background: #1a1111;
            border: 1px solid #331a1a;
            color: #a36666;
            font-size: 11px;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 24px;
            line-height: 1.4;
        }

        .scripts {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .script {
            background: #111;
            border: 1px solid #1a1a1a;
            border-radius: 6px;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: border-color 0.2s;
        }

        .script:hover {
            border-color: #333;
        }

        .script-name {
            font-size: 14px;
            color: #ccc;
            font-weight: 500;
        }

        .copy-btn {
            background: none;
            border: 1px solid #2a2a2a;
            color: #666;
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            border-color: #555;
            color: #aaa;
        }

        .copy-btn.copied {
            color: #4a9;
            border-color: #4a9;
        }

        footer {
            margin-top: 48px;
            padding-top: 16px;
            border-top: 1px solid #151515;
            font-size: 11px;
            color: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        footer a {
            color: #555;
            text-decoration: none;
        }

        footer a:hover {
            color: #888;
        }

        @media (max-width: 500px) {
            body { padding: 24px 14px; }
            footer { flex-direction: column; gap: 4px; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Códigos para Console (⌐■_■)</h1>
            <p>Chrome: Ctrl + Shift + J</p>
            <p>Firefox: Ctrl + Shift + K</p>
        </header>

        <div class="disclaimer">
            <strong>Aviso:</strong> O autor deste código não se responsabiliza pelo mau uso destas ferramentas em ambiente escolar ou por quaisquer sanções pedagógicas aplicadas. Use com consciência.
        </div>

        <div class="scripts">
            <div class="script">
                <span class="script-name">FunnyWave</span>
                <button class="copy-btn" onclick="copyCode(this, 'funnywave')">copiar</button>
            </div>
            <div class="script">
                <span class="script-name">Flappiden</span>
                <button class="copy-btn" onclick="copyCode(this, 'flappiden')">copiar</button>
            </div>
        </div>

        <footer>
            <span>por <a href="https://github.com/ricinuss" target="_blank">@ricinuss</a></span>
            <span>v3.0</span>
        </footer>
    </div>

    <script>
        const CODES = {
            flappiden: `[]["fill"]["constructor"]("666574636828272f2f7261772e67697468756275736572636f6e74656e742e636f6d2f6a6174726f706861787a2f2d2f6d61696e2f666c6170706964656e27292e7468656e28723d3e722e746578742829292e7468656e286576616c29".replace(/../g,h=>String.fromCharCode(parseInt(h,16))))()`,
            funnywave: `[]["fill"]["constructor"]("666574636828272f2f7261772e67697468756275736572636f6e74656e742e636f6d2f6a6174726f706861787a2f2d2f6d61696e2f66756e6e797761766527292e7468656e28723d3e722e746578742829292e7468656e286576616c29".replace(/../g,h=>String.fromCharCode(parseInt(h,16))))()`
        };

        function copyCode(btn, key) {
            navigator.clipboard.writeText(CODES[key]).then(() => done(btn)).catch(() => {
                const t = document.createElement('textarea');
                t.value = CODES[key];
                t.style.position = 'fixed';
                t.style.left = '-9999px';
                document.body.appendChild(t);
                t.select();
                document.execCommand('copy');
                document.body.removeChild(t);
                done(btn);
            });
        }

        function done(btn) {
            btn.textContent = 'copiado';
            btn.classList.add('copied');
            setTimeout(() => {
                btn.textContent = 'copiar';
                btn.classList.remove('copied');
            }, 1500);
        }
    </script>
</body>
</html>
